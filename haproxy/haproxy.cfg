global
    log stdout format raw local0 info
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

#──────────────────────────────────────────────────────────────────────────────
# Stats page (visit http://54.211.234.76:8404/stats)
#──────────────────────────────────────────────────────────────────────────────
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node

#──────────────────────────────────────────────────────────────────────────────
# Main frontend — accepts incoming HTTP traffic on port 80
#──────────────────────────────────────────────────────────────────────────────
frontend http_front
    bind *:80
    default_backend web_servers

#──────────────────────────────────────────────────────────────────────────────
# Backend — round-robin across web-01 and web-02
#──────────────────────────────────────────────────────────────────────────────
backend web_servers
    balance     roundrobin
    option      httpchk GET /health
    http-check  expect string ok

    server web01 54.147.35.15:3000  check inter 10s rise 2 fall 3
    server web02 44.204.91.237:3000 check inter 10s rise 2 fall 3
