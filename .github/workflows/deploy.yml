name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/rwanda-route-optimizer
  LB_IMAGE:  ghcr.io/${{ github.repository_owner }}/rwanda-haproxy
  SSH_USER:  ubuntu

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build & push both Docker images to GitHub Container Registry
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      app_tag: ${{ steps.meta-app.outputs.tags }}
      lb_tag:  ${{ steps.meta-lb.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── App image metadata ──
      - name: Extract metadata for app image
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # ── HAProxy image metadata ──
      - name: Extract metadata for HAProxy image
        id: meta-lb
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.LB_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      # ── Build & push app image ──
      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build & push HAProxy image ──
      - name: Build and push HAProxy image
        uses: docker/build-push-action@v5
        with:
          context: ./haproxy
          file: ./haproxy/Dockerfile
          push: true
          tags: ${{ steps.meta-lb.outputs.tags }}
          labels: ${{ steps.meta-lb.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy app to web-01
  # ────────────────────────────────────────────────────────────────────────────
  deploy-web01:
    name: Deploy → web-01 (54.147.35.15)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app container on web-01
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.147.35.15
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Log in to ghcr.io
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Pull the latest image
            docker pull ${{ env.APP_IMAGE }}:latest

            # Stop and remove existing container (if any)
            docker stop rwanda-app 2>/dev/null || true
            docker rm   rwanda-app 2>/dev/null || true

            # Start fresh container
            docker run -d \
              --name rwanda-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e PORT=3000 \
              -e API_KEY=${{ secrets.API_KEY }} \
              ${{ env.APP_IMAGE }}:latest

            # Verify it's healthy
            sleep 5
            curl -sf http://localhost:3000/health || (docker logs rwanda-app && exit 1)

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy app to web-02
  # ────────────────────────────────────────────────────────────────────────────
  deploy-web02:
    name: Deploy → web-02 (44.204.91.237)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app container on web-02
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 44.204.91.237
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.APP_IMAGE }}:latest

            docker stop rwanda-app 2>/dev/null || true
            docker rm   rwanda-app 2>/dev/null || true

            docker run -d \
              --name rwanda-app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e PORT=3000 \
              -e API_KEY=${{ secrets.API_KEY }} \
              ${{ env.APP_IMAGE }}:latest

            sleep 5
            curl -sf http://localhost:3000/health || (docker logs rwanda-app && exit 1)

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy HAProxy to lb-01  (runs after both web servers are up)
  # ────────────────────────────────────────────────────────────────────────────
  deploy-lb:
    name: Deploy → lb-01 HAProxy (54.211.234.76)
    needs: [deploy-web01, deploy-web02]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy HAProxy container on lb-01
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 54.211.234.76
          username: ${{ env.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.LB_IMAGE }}:latest

            docker stop rwanda-haproxy 2>/dev/null || true
            docker rm   rwanda-haproxy 2>/dev/null || true

            docker run -d \
              --name rwanda-haproxy \
              --restart unless-stopped \
              -p 80:80 \
              -p 8404:8404 \
              ${{ env.LB_IMAGE }}:latest

            # Verify LB is up
            sleep 5
            curl -sf http://localhost/health || (docker logs rwanda-haproxy && exit 1)
